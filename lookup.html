<script runat="server">
Platform.Load("core", "1.1.5");
/* 
  Get form values via SSJS — avoids AMPscript RequestParameter() 
  which causes preview errors without subscriber context 
*/
var _pageURL = Request.GetQueryStringParameter("PAGEURL") || "";
var _DEprop  = Request.GetQueryStringParameter("DEprop")  || "Name";
var _DEval   = Request.GetQueryStringParameter("DEval")   || "";
</script>

<!-- ════════════════ SEARCH FORM ════════════════ -->
<div class="search-form">
  <form action="%%=v(_pageURL)=%%" method="post" id="search-form">
    <div class="form-row">

      <div class="form-group">
        <label class="form-label">Search By</label>
        <select name="DEprop">
          <option value="Name">Name or Keyword</option>
          <option value="CustomerKey">External Key</option>
        </select>
      </div>

      <span class="form-connector">contains</span>

      <div class="form-group">
        <label class="form-label">Search Term</label>
        <input type="text" name="DEval" value="" maxlength="128" placeholder="e.g. Newsletter, contacts_2024…" autocomplete="off">
      </div>

      <button type="submit" class="btn-search">&#128269; Search</button>

    </div>
  </form>
</div>

<!-- ════════════════ LOADING STATE ════════════════ -->
<div class="loading-state" id="loading-state">
  <div class="spinner"></div>
  <p>Searching Data Extensions&hellip;</p>
</div>

<!-- ════════════════ RESULTS AREA ════════════════ -->
<div class="results-area" id="results-area">
<script runat="server">
Platform.Load("core", "1.1.5");

if (_DEprop && _DEval) {

  var api       = new Script.Util.WSProxy();
  var searchVal = "%" + _DEval + "%";
  var cols      = ["Name", "CustomerKey", "CategoryID", "IsSendable", "IsTestable"];
  var filter    = { Property: _DEprop, SimpleOperator: "like", Value: searchVal };

  var allDEs   = [];
  var moreData = true;
  var reqID    = null;
  var hasError = false;

  // ── WSProxy paginated retrieval (fixes timeout on large instances) ──
  try {
    while (moreData) {
      moreData = false;
      var data = (reqID == null)
        ? api.retrieve("DataExtension", cols, filter)
        : api.getNextBatch("DataExtension", reqID);

      if (data != null) {
        moreData = data.HasMoreRows;
        reqID    = data.RequestID;
        for (var i = 0; i < data.Results.length; i++) {
          allDEs.push(data.Results[i]);
        }
      }
    }
  } catch(e) {
    hasError = true;
    Write('<div class="error-state">');
    Write('<div class="state-icon">&#9888;</div>');
    Write('<p>An error occurred while retrieving Data Extensions.</p>');
    Write('<p style="font-size:.8rem;color:#94a3b8;">' + Stringify(e) + '</p>');
    Write('</div>');
  }

  if (!hasError) {

    if (allDEs.length === 0) {
      // ── Empty state ──
      Write('<div class="empty-state">');
      Write('<div class="state-icon">&#128269;</div>');
      Write('<p>No Data Extensions found matching <strong>"' + _DEval + '"</strong>.</p>');
      Write('<p>Try a different keyword or search property.</p>');
      Write('</div>');

    } else {

      // ── Folder path resolver with caching ──
      var folderCache = {};

      function getFolderPath(id) {
        if (folderCache[id] !== undefined) return folderCache[id];
        var path      = [];
        var currentID = id;
        var visited   = {};

        while (currentID > 0) {
          if (visited[currentID]) break;
          visited[currentID] = true;
          if (folderCache[currentID] !== undefined) {
            path = folderCache[currentID].concat(path);
            break;
          }
          try {
            var res = Folder.Retrieve({ Property: "ID", SimpleOperator: "equals", Value: currentID });
            if (res && res.length > 0) {
              path.unshift(res[0].Name);
              currentID = res[0].ParentFolder.ID;
            } else { break; }
          } catch(fe) { break; }
        }
        folderCache[id] = path;
        return path;
      }

      // ── Highlight search term in result text ──
      function highlight(text, term) {
        if (!text || !term) return text || "";
        var lText = text.toLowerCase();
        var lTerm = term.toLowerCase();
        var idx   = lText.indexOf(lTerm);
        if (idx === -1) return text;
        return text.substring(0, idx)
          + "<mark>" + text.substring(idx, idx + term.length) + "</mark>"
          + text.substring(idx + term.length);
      }

      // ── Results header ──
      Write('<div class="results-header">');
      Write('<span class="results-count">&#10003; Found ' + allDEs.length + ' Data Extension' + (allDEs.length !== 1 ? 's' : '') + '</span>');
      Write('<button class="btn-export" id="btn-export">&#8595; Export CSV</button>');
      Write('</div>');

      // ── Results table ──
      Write('<div class="results-table-wrap">');
      Write('<table class="results-table">');
      Write('<thead><tr>');
      Write('<th>Name &amp; Path</th>');
      Write('<th>External Key</th>');
      Write('<th>Sendable</th>');
      Write('<th>Testable</th>');
      Write('</tr></thead>');
      Write('');

      for (var j = 0; j < allDEs.length; j++) {
        var de         = allDEs[j];
        var deName     = de.Name        || "";
        var deKey      = de.CustomerKey || "";
        var deSendable = de.IsSendable  ? "Yes" : "No";
        var deTestable = de.IsTestable  ? "Yes" : "No";

        var pathParts  = getFolderPath(de.CategoryID);
        var pathFinal  = pathParts.length > 0 ? pathParts[pathParts.length - 1] : "";
        var pathLeadin = pathParts.length > 1
          ? pathParts.slice(0, pathParts.length - 1).join(" &rsaquo; ")
          : "";
        var fullPath   = pathParts.join(" > ");

        var highlightedName = (_DEprop === "Name")        ? highlight(deName, _DEval) : deName;
        var highlightedKey  = (_DEprop === "CustomerKey") ? highlight(deKey,  _DEval) : deKey;

        var sendBadge = de.IsSendable ? "badge-yes" : "badge-no";
        var testBadge = de.IsTestable ? "badge-yes" : "badge-no";

        Write('<tr class="result-row"'
          + ' data-name="'     + deName.replace(/"/g, "&quot;")   + '"'
          + ' data-key="'      + deKey.replace(/"/g, "&quot;")    + '"'
          + ' data-path="'     + fullPath.replace(/"/g, "&quot;") + '"'
          + ' data-sendable="' + deSendable + '"'
          + ' data-testable="' + deTestable + '"'
          + '>');

        Write('<td>');
        Write('<div class="de-name">' + highlightedName + '</div>');
        if (pathParts.length > 0) {
          Write('<div class="de-path">');
          if (pathLeadin) Write('<span class="path-segment">' + pathLeadin + ' &rsaquo; </span>');
          Write('<span class="path-final">' + pathFinal + '</span>');
          Write('</div>');
        }
        Write('</td>');
        Write('<td><span class="key-text">' + highlightedKey + '</span></td>');
        Write('<td><span class="badge ' + sendBadge + '">' + deSendable + '</span></td>');
        Write('<td><span class="badge ' + testBadge + '">' + deTestable + '</span></td>');
        Write('</tr>');
      }

      Write('</table></div>');

      // ── Pagination (JS in root.html handles show/hide logic) ──
      Write('<div class="pagination" id="pagination" style="display:none;">');
      Write('<button class="btn-page" id="btn-prev" disabled>&#8592; Prev</button>');
      Write('<span class="page-info" id="page-info"></span>');
      Write('<button class="btn-page" id="btn-next">Next &#8594;</button>');
      Write('</div>');

    }
  }

} // end if _DEprop && _DEval
</script>
</div><!-- /results-area -->
